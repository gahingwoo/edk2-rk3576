name: Build NanoPi M5 UEFI Firmware

on:
  push:
    branches: [main, master]
    paths:
      - 'edk2_port/edk2-rockchip/edk2-rockchip/Platform/FriendlyElec/**'
      - 'edk2_port/edk2-rockchip/edk2-rockchip/Silicon/Rockchip/RK3576/**'
      - '.github/workflows/build-nanopi-m5.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'edk2_port/edk2-rockchip/edk2-rockchip/Platform/FriendlyElec/**'
      - 'edk2_port/edk2-rockchip/edk2-rockchip/Silicon/Rockchip/RK3576/**'
      - '.github/workflows/build-nanopi-m5.yml'
  workflow_dispatch:

#
# MAINLINE STATUS NOTE (NanoPi M5 specific)
# ──────────────────────────────────────────
# The NanoPi M5 vendor DTB (rk3576-nanopi-m5.dtb) is NOT included in this
# repository because rk3576-nanopi-m5.dts has not been merged into mainline
# Linux as of the time of writing.
#
# To obtain the vendor DTB:
#   1. Clone FriendlyElec vendor kernel:
#      git clone https://github.com/friendlyarm/kernel-rockchip -b nanopi6-v6.1.y
#   2. Build DTBs:
#      make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- nanopi5_linux_defconfig dtbs
#   3. Place at:
#      edk2_port/edk2-rockchip/edk2-rockchip/Platform/FriendlyElec/NanoPi-M5/
#        devicetree/vendor/rk3576-nanopi-m5.dtb
#
# This CI pipeline skips the DTB embedding step and produces FV-only output.
# Once a mainline or vendor DTB is available, the workflow can be updated to
# include it via the Vendor.inf module in NanoPi-M5.Modules.fdf.inc.
#

jobs:
  build:
    name: Build NanoPi M5 (RK3576)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cross-compilation toolchain and EDK2 dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential uuid-dev nasm acpica-tools \
            python3 python3-pyelftools python3-dev swig \
            libssl-dev libgnutls28-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Init EDK2 submodules (brotli / mipisyst / libfdt / openssl / mbedtls)
        working-directory: edk2_port/edk2
        run: |
          git submodule update --init --depth=1 \
            MdeModulePkg/Library/BrotliCustomDecompressLib/brotli \
            MdePkg/Library/MipiSysTLib/mipisyst \
            MdePkg/Library/BaseFdtLib/libfdt \
            CryptoPkg/Library/OpensslLib/openssl \
            CryptoPkg/Library/MbedTlsLib/mbedtls || true

      - name: Build EDK2 BaseTools (native x86-64)
        working-directory: edk2_port/edk2
        run: |
          make -C BaseTools CC=gcc CXX=g++ BUILD_CC=gcc BUILD_CXX=g++ -j$(nproc) 2>&1 | tail -10

      - name: Patch tools_def.target for GCC warnings
        working-directory: edk2_port
        run: |
          python3 patch_tools_def.py edk2-rockchip/Conf/tools_def.txt 2>/dev/null || \
          python3 patch_tools_def.py edk2/BaseTools/Conf/tools_def.template 2>/dev/null || true

      - name: Create vendor DTB placeholder
        # The vendor DTB binary is not committed to the repository.
        # Create an empty placeholder so the build proceeds (Vendor.inf embeds it).
        # In a real build with hardware support, replace this with the actual DTB.
        run: |
          DTB_DIR=edk2_port/edk2-rockchip/edk2-rockchip/Platform/FriendlyElec/NanoPi-M5/devicetree/vendor
          mkdir -p "$DTB_DIR"
          if [ ! -f "$DTB_DIR/rk3576-nanopi-m5.dtb" ]; then
            echo "NOTE: Using empty DTB placeholder — install real DTB from FriendlyElec kernel"
            touch "$DTB_DIR/rk3576-nanopi-m5.dtb"
          fi

      - name: Build NanoPi M5 UEFI (EDK2 AARCH64 RELEASE)
        working-directory: edk2_port/edk2-rockchip
        env:
          GCC5_AARCH64_PREFIX: aarch64-linux-gnu-
          GCC_AARCH64_PREFIX: aarch64-linux-gnu-
        run: |
          RK_INNER="$(pwd)/edk2-rockchip"
          [ ! -d "$RK_INNER/Platform" ] && RK_INNER="$(pwd)"
          export EDK_TOOLS_PATH="$(cd ../edk2/BaseTools && pwd)"
          export WORKSPACE="$(pwd)"
          export CONF_PATH="$(pwd)/Conf"
          export PACKAGES_PATH="$RK_INNER:$(pwd):$(cd ../edk2 && pwd):$(cd ../edk2-non-osi && pwd):$(pwd)/edk2-platforms:$(pwd)/edk2-rockchip-non-osi"
          export PYTHONPATH="$(cd ../edk2 && pwd)/BaseTools/Source/Python"
          export PATH="$(cd ../edk2 && pwd)/BaseTools/BinWrappers/PosixLike:$(cd ../edk2 && pwd)/BaseTools/Source/C/bin:$PATH"
          sudo mkdir -p /Scripts && sudo ln -sfn "$(cd ../edk2 && pwd)/BaseTools/Scripts/GccBase.lds" /Scripts/GccBase.lds || true
          set +eu
          source ../edk2/edksetup.sh BaseTools 2>/dev/null || true
          set -eu
          build -s -n "$(nproc)" -a AARCH64 -t GCC \
                -p "Platform/FriendlyElec/NanoPi-M5/NanoPi-M5.dsc" \
                -b RELEASE -D FIRMWARE_VER="rk3576-nanopi-m5-${{ github.sha }}"

      - name: Collect firmware artifact
        run: |
          mkdir -p artifacts
          cp edk2_port/edk2-rockchip/Build/NanoPi-M5/RELEASE_GCC/FV/BL33_AP_UEFI.Fv \
             artifacts/nanopi-m5-BL33_AP_UEFI.Fv

      - name: Upload NanoPi M5 firmware
        uses: actions/upload-artifact@v4
        with:
          name: nanopi-m5-uefi-${{ github.sha }}
          path: artifacts/
          retention-days: 30
