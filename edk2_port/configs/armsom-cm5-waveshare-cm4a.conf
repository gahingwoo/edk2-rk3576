# Build configuration for ArmSoM CM5 on Waveshare CM4-IO-BASE-A
#
# Usage:
#   bash build_rock4d_uefi.sh --config configs/armsom-cm5-waveshare-cm4a.conf
#
# Output: output/CM5WaveshareA/CM5WaveshareA-spi-edk2.img
#
# Hardware notes:
#   - 2× USB 2.0 Type-A via FE1.1S USB hub (no USB3 SS on standard ports)
#   - USB3 SS available via side USB adapter connector (DRD0 lane)
#   - HDMI0 only (HDMI1 connector carries USB3 SS signals)
#   - M.2 M-key PCIe 2.0 ×1 slot
#   - 5V DC input (USB-C PD or 5V GPIO pin)
#   - No USB-C OTG port
#
# GPIO note:
#   PCIe and GbE GPIO assignments are assumed same as CM5-IO.
#   Verify with Waveshare CM4-IO-BASE-A schematic before production use.

PLATFORM_NAME=CM5WaveshareA
DSC_FILE=Platform/ArmSoM/CM5WaveshareA/CM5WaveshareA.dsc
DEVICE_TREE_NAME=rk3576-armsom-cm5-waveshare-cm4a
